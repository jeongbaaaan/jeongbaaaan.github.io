<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="480" fill="#f8f9fa" rx="12"/>
  <text x="450" y="38" font-size="15" font-weight="700" fill="#1a1a2e" text-anchor="middle">SmileShark Mailer — 시스템 아키텍처</text>
  <line x1="60" y1="52" x2="840" y2="52" stroke="#e0e0e0" stroke-width="1"/>

  <!-- 관리콘솔 (React) -->
  <rect x="40" y="80" width="175" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="127" y="106" font-size="11" font-weight="700" fill="#1d4ed8" text-anchor="middle">관리콘솔</text>
  <line x1="60" y1="116" x2="215" y2="116" stroke="#dbeafe" stroke-width="1"/>
  <text x="127" y="136" font-size="10" fill="#1e40af" text-anchor="middle">React Web App</text>
  <text x="127" y="154" font-size="10" fill="#1e40af" text-anchor="middle">수신자 목록 관리</text>
  <text x="127" y="172" font-size="10" fill="#1e40af" text-anchor="middle">발송 이력 조회</text>

  <!-- 크롬 확장 -->
  <rect x="40" y="232" width="175" height="130" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="127" y="257" font-size="11" font-weight="700" fill="#ea580c" text-anchor="middle">크롬 확장 (MV3)</text>
  <line x1="60" y1="267" x2="215" y2="267" stroke="#fed7aa" stroke-width="1"/>
  <text x="127" y="287" font-size="10" fill="#9a3412" text-anchor="middle">Gmail 탭 내 패널</text>
  <text x="127" y="305" font-size="10" fill="#9a3412" text-anchor="middle">수신자 자동 입력</text>
  <text x="127" y="323" font-size="10" fill="#9a3412" text-anchor="middle">발송 전 미리보기</text>
  <text x="127" y="348" font-size="9" fill="#fb923c" text-anchor="middle">Manifest V3</text>

  <!-- Arrow label -->
  <text x="283" y="168" font-size="9" fill="#64748b" text-anchor="middle">같은 로컬</text>
  <text x="283" y="180" font-size="9" fill="#64748b" text-anchor="middle">API 호출</text>

  <!-- Arrows from left to Fastify -->
  <line x1="215" y1="130" x2="345" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="215" y1="290" x2="345" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Fastify API (center hub) -->
  <rect x="345" y="150" width="210" height="160" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="450" y="175" font-size="12" font-weight="700" fill="#7e22ce" text-anchor="middle">Fastify API</text>
  <text x="450" y="192" font-size="10" fill="#a855f7" text-anchor="middle">localhost:3000</text>
  <line x1="365" y1="202" x2="555" y2="202" stroke="#f3e8ff" stroke-width="1"/>
  <text x="450" y="222" font-size="10" fill="#6b21a8" text-anchor="middle">수신자 CRUD</text>
  <text x="450" y="240" font-size="10" fill="#6b21a8" text-anchor="middle">발송 이력 저장</text>
  <text x="450" y="258" font-size="10" fill="#6b21a8" text-anchor="middle">템플릿 관리</text>
  <text x="450" y="276" font-size="10" fill="#6b21a8" text-anchor="middle">기기 간 상태 동기화</text>
  <text x="450" y="298" font-size="9" fill="#a855f7" text-anchor="middle">Node.js · Fastify</text>

  <!-- Arrow Fastify to/from DB -->
  <line x1="555" y1="230" x2="623" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="623" y1="210" x2="555" y2="210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- 단일 DB -->
  <rect x="625" y="160" width="230" height="140" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="740" y="185" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">단일 DB</text>
  <line x1="645" y1="195" x2="855" y2="195" stroke="#dcfce7" stroke-width="1"/>
  <text x="740" y="215" font-size="10" fill="#166534" text-anchor="middle">수신자 목록</text>
  <text x="740" y="233" font-size="10" fill="#166534" text-anchor="middle">발송 이력 · 템플릿</text>
  <text x="740" y="251" font-size="10" fill="#166534" text-anchor="middle">기기 간 공유 상태</text>
  <text x="740" y="278" font-size="9" fill="#22c55e" text-anchor="middle">어느 기기에서든 동일한 데이터</text>

  <!-- Gmail -->
  <rect x="625" y="72" width="230" height="72" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="740" y="98" font-size="11" font-weight="700" fill="#b91c1c" text-anchor="middle">Gmail</text>
  <line x1="645" y1="108" x2="855" y2="108" stroke="#fee2e2" stroke-width="1"/>
  <text x="740" y="126" font-size="10" fill="#991b1b" text-anchor="middle">발송 주체는 사용자 본인</text>

  <!-- Dashed arrow: Chrome ext to Gmail -->
  <line x1="127" y1="232" x2="625" y2="108" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="390" y="148" font-size="9" fill="#ea580c" text-anchor="middle">Gmail에서 직접 발송</text>

  <!-- Bottom bar -->
  <rect x="40" y="398" width="820" height="36" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="420" font-size="10" fill="#475569" text-anchor="middle">관리콘솔 · 크롬 확장 → 동일한 Fastify API → DB 단일화 → 기기 간 발송 이력 동기화</text>

  <!-- Insight bar -->
  <rect x="40" y="442" width="820" height="30" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.2"/>
  <text x="450" y="462" font-size="10" font-weight="700" fill="#7e22ce" text-anchor="middle">핵심 설계: 두 클라이언트가 같은 API를 공유 → 코드 중복 없이 기능 통합</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb923c"/>
    </marker>
  </defs>
</svg>
