<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="480" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" font-size="15" font-weight="700" fill="#1a1a2e" text-anchor="middle">Cloud Infra Management — MSP Architecture</text>
  <line x1="60" y1="52" x2="840" y2="52" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Section: Customer Accounts -->
  <rect x="40" y="76" width="160" height="100" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="120" y="100" font-size="11" font-weight="700" fill="#ea580c" text-anchor="middle">고객 계정 (70+)</text>
  <text x="120" y="118" font-size="10" fill="#9a3412" text-anchor="middle">EC2 · RDS · Lambda</text>
  <text x="120" y="134" font-size="10" fill="#9a3412" text-anchor="middle">S3 · CloudFront</text>
  <text x="120" y="150" font-size="10" fill="#9a3412" text-anchor="middle">각 고객 AWS Account</text>

  <!-- Arrow -->
  <line x1="200" y1="126" x2="250" y2="126" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AM Analysis -->
  <rect x="250" y="76" width="160" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="330" y="100" font-size="11" font-weight="700" fill="#1d4ed8" text-anchor="middle">AM 분석</text>
  <text x="330" y="118" font-size="10" fill="#1e40af" text-anchor="middle">Cost Explorer</text>
  <text x="330" y="134" font-size="10" fill="#1e40af" text-anchor="middle">Well-Architected Review</text>
  <text x="330" y="150" font-size="10" fill="#1e40af" text-anchor="middle">리소스 점검</text>

  <!-- Arrow -->
  <line x1="410" y1="126" x2="460" y2="126" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Optimization -->
  <rect x="460" y="76" width="160" height="100" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="540" y="100" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">최적화 제안</text>
  <text x="540" y="118" font-size="10" fill="#166534" text-anchor="middle">RI 전환 분석</text>
  <text x="540" y="134" font-size="10" fill="#166534" text-anchor="middle">S3 Lifecycle 설정</text>
  <text x="540" y="150" font-size="10" fill="#166534" text-anchor="middle">불필요 리소스 정리</text>

  <!-- Arrow -->
  <line x1="620" y1="126" x2="670" y2="126" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Report -->
  <rect x="670" y="76" width="180" height="100" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="760" y="100" font-size="11" font-weight="700" fill="#7e22ce" text-anchor="middle">고객 보고</text>
  <text x="760" y="118" font-size="10" fill="#6b21a8" text-anchor="middle">의사결정 가능한 리스트</text>
  <text x="760" y="134" font-size="10" fill="#6b21a8" text-anchor="middle">비용 절감 효과 수치화</text>
  <text x="760" y="150" font-size="10" fill="#6b21a8" text-anchor="middle">운영 리스크 정리</text>

  <!-- Divider -->
  <line x1="60" y1="210" x2="840" y2="210" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="228" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">QR 이미지 파이프라인 — 스토리지 60% 절감</text>

  <!-- Pipeline diagram -->
  <!-- S3 upload -->
  <rect x="80" y="248" width="130" height="72" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="145" y="272" font-size="22" text-anchor="middle">🗃️</text>
  <text x="145" y="292" font-size="11" font-weight="700" fill="#ea580c" text-anchor="middle">S3 Upload</text>
  <text x="145" y="308" font-size="9" fill="#9a3412" text-anchor="middle">원본 QR 이미지</text>

  <line x1="210" y1="284" x2="255" y2="284" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="232" y="278" font-size="9" fill="#94a3b8" text-anchor="middle">trigger</text>

  <!-- Lambda -->
  <rect x="255" y="248" width="130" height="72" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="272" font-size="22" text-anchor="middle">λ</text>
  <text x="320" y="292" font-size="11" font-weight="700" fill="#b45309" text-anchor="middle">Lambda</text>
  <text x="320" y="308" font-size="9" fill="#92400e" text-anchor="middle">자동 리사이징</text>

  <line x1="385" y1="284" x2="430" y2="284" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- S3 optimized -->
  <rect x="430" y="248" width="130" height="72" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="495" y="272" font-size="22" text-anchor="middle">📦</text>
  <text x="495" y="292" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">S3 (최적화)</text>
  <text x="495" y="308" font-size="9" fill="#166534" text-anchor="middle">압축된 이미지 저장</text>

  <line x1="560" y1="284" x2="605" y2="284" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CloudFront -->
  <rect x="605" y="248" width="130" height="72" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="670" y="272" font-size="22" text-anchor="middle">🌐</text>
  <text x="670" y="292" font-size="11" font-weight="700" fill="#1d4ed8" text-anchor="middle">CloudFront</text>
  <text x="670" y="308" font-size="9" fill="#1e40af" text-anchor="middle">CDN 배포</text>

  <line x1="735" y1="284" x2="780" y2="284" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- End user -->
  <rect x="780" y="248" width="80" height="72" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="820" y="279" font-size="20" text-anchor="middle">👤</text>
  <text x="820" y="298" font-size="10" font-weight="700" fill="#475569" text-anchor="middle">고객</text>

  <!-- Result badge -->
  <rect x="200" y="348" width="500" height="36" rx="18" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="371" font-size="12" font-weight="700" fill="#15803d" text-anchor="middle">스토리지 비용 60% 절감 · Lambda 서버리스 자동화 · CloudFront CDN 유지</text>

  <!-- Badge: AWS Trainings -->
  <rect x="40" y="414" width="820" height="42" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="440" font-size="11" fill="#475569" text-anchor="middle">AWS 공식 교육 6종 수료: Serverless · DevOps · Developing · Well-Architected · Technical Essentials · Security Essentials</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>